services:
  # ----- Nginx -----
  uzte-nginx:
    image: nginx:1.28-alpine
    container_name: uzte-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    tty: true
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - uzte-network
    depends_on:
      - uzte-app

  # ----- PHP-FPM -----
  uzte-app:
    build:
      context: .
      dockerfile: docker/production.Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
    container_name: uzte-app
    restart: unless-stopped
    tty: true
    volumes:
      - ./:/var/www
    networks:
      - uzte-network
    depends_on:
      uzte-postgres:
        condition: service_healthy
      uzte-redis:
        condition: service_healthy

  # ----- PostgreSQL -----
  uzte-postgres:
    image: postgres:18-alpine
    container_name: uzte-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - uzte_pg_data:/var/lib/postgresql
    networks:
      - uzte-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-app}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ----- pgAdmin -----
  uzte-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: uzte-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - uzte_pgadmin_data:/var/lib/pgadmin
    networks:
      - uzte-network
    depends_on:
      uzte-postgres:
        condition: service_healthy

  # ----- Node -----
  uzte-node:
    image: node:22-alpine
    container_name: uzte-node
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "${VITE_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - uzte-network

  # ----- Redis -----
  uzte-redis:
    image: redis:7-alpine
    container_name: uzte-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - uzte_redis_data:/data
    networks:
      - uzte-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  uzte_pg_data:
  uzte_pgadmin_data:
  uzte_redis_data:

networks:
  uzte-network:
    driver: bridge