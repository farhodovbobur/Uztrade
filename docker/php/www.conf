[www]
; ----- Process management -----
pm                   = dynamic
pm.max_children      = 50
pm.start_servers     = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.max_requests      = 500

; ----- Slow log (debug) -----
slowlog                   = /proc/self/fd/2
request_slowlog_timeout   = 10s
request_terminate_timeout = 60s

; ----- Clear environment -----
clear_env = no
